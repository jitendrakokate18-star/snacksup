kind = "web"
previewPath = "/"
title = "SnacksUp"
version = "1.0.0"
id = "artifacts/snacksup"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24018

[services.development]
run = "pnpm --filter @workspace/snacksup run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/snacksup", "run", "build" ]
publicDir = "artifacts/snacksup/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24018"
BASE_PATH = "/"
